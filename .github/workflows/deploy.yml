name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      VITE_REQUIRE_PASSKEY: "true"
      VITE_PAGES_ACCESS_CODE: "M0ckup#insw2026"
      VITE_FEEDBACK_FEED_URL: ${{ secrets.VITE_FEEDBACK_FEED_URL }}
      VITE_DISCORD_FEEDBACK_SUBMIT_URL: ${{ secrets.VITE_DISCORD_FEEDBACK_SUBMIT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
